<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test Automotora - Vehículos</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7fa;
        --surface: #ffffff;
        --line: #dde3ea;
        --text: #0f172a;
        --muted: #4b5563;
        --brand: #0b57d0;
        --brand-soft: #e8f0ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .page {
        max-width: 1100px;
        margin: 0 auto;
        padding: 24px 16px 40px;
        display: grid;
        gap: 16px;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 14px;
      }

      .title {
        margin: 0;
        font-size: 1.35rem;
      }

      .muted {
        margin: 8px 0 0;
        color: var(--muted);
      }

      .config-grid {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 0.85rem;
        color: var(--muted);
      }

      input,
      button {
        font: inherit;
      }

      input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 9px 10px;
      }

      button {
        border: 1px solid var(--brand);
        background: var(--brand);
        color: #fff;
        border-radius: 8px;
        padding: 9px 12px;
        cursor: pointer;
      }

      .status-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      .status-pill {
        background: var(--brand-soft);
        color: var(--brand);
        border: 1px solid #c7d8ff;
        border-radius: 999px;
        padding: 4px 10px;
        font-size: 0.82rem;
      }

      .vehicles-grid {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      }

      .vehicle-card {
        border: 1px solid var(--line);
        border-radius: 10px;
        overflow: hidden;
        background: #fff;
      }

      .vehicle-image {
        width: 100%;
        height: 170px;
        object-fit: cover;
        border-bottom: 1px solid var(--line);
        background: #eef2f7;
      }

      .vehicle-body {
        padding: 10px;
        display: grid;
        gap: 6px;
      }

      .vehicle-title {
        margin: 0;
        font-size: 1rem;
      }

      .kv {
        display: grid;
        grid-template-columns: 110px 1fr;
        gap: 6px;
        font-size: 0.88rem;
      }

      .kv dt {
        color: var(--muted);
      }

      .kv dd {
        margin: 0;
      }

      .empty {
        color: var(--muted);
        border: 1px dashed var(--line);
        border-radius: 10px;
        padding: 16px;
        text-align: center;
      }

      pre {
        margin: 0;
        max-height: 300px;
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px;
        background: #fbfcfe;
        font-size: 0.78rem;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="card">
        <h1 class="title">Test Automotora - Vehículos</h1>
        <p class="muted">
          Página de prueba conectada al CMS para validar listado de vehículos.
        </p>
      </section>

      <section class="card">
        <form id="config-form">
          <div class="config-grid">
            <label>
              API base
              <input id="api-base" type="text" value="/api/v1" />
            </label>
            <label>
              Tenant slug
              <input id="tenant-slug" type="text" placeholder="automotora-demo" required />
            </label>
            <label>
              Content type slug
              <input id="content-type-slug" type="text" value="vehicles" required />
            </label>
          </div>
          <div style="margin-top: 10px">
            <button type="submit">Cargar vehículos</button>
          </div>
        </form>
      </section>

      <section class="card">
        <div class="status-row">
          <span id="status" class="status-pill">Esperando configuración...</span>
          <span id="summary" class="status-pill">Vehículos encontrados: 0</span>
        </div>
      </section>

      <section class="card">
        <h2 style="margin-top: 0">Vehículos</h2>
        <div id="vehicles-grid" class="vehicles-grid"></div>
      </section>

      <section class="card">
        <h2 style="margin-top: 0">Detalle crudo (JSON)</h2>
        <pre id="raw-output"></pre>
      </section>
    </main>

    <script>
      const form = document.getElementById('config-form');
      const apiBaseInput = document.getElementById('api-base');
      const tenantSlugInput = document.getElementById('tenant-slug');
      const contentTypeSlugInput = document.getElementById('content-type-slug');
      const statusEl = document.getElementById('status');
      const summaryEl = document.getElementById('summary');
      const vehiclesGrid = document.getElementById('vehicles-grid');
      const rawOutput = document.getElementById('raw-output');

      function asText(value) {
        return typeof value === 'string' ? value : value == null ? '' : String(value);
      }

      function asNumberLike(value) {
        if (typeof value === 'number') return String(value);
        if (typeof value === 'string') return value;
        return '';
      }

      function readQueryConfig() {
        const params = new URLSearchParams(window.location.search);
        const api = params.get('api');
        const tenant = params.get('tenant');
        const contentType = params.get('contentType');
        if (api) apiBaseInput.value = api;
        if (tenant) tenantSlugInput.value = tenant;
        if (contentType) contentTypeSlugInput.value = contentType;
      }

      function writeQueryConfig(apiBase, tenantSlug, contentTypeSlug) {
        const params = new URLSearchParams();
        params.set('api', apiBase);
        params.set('tenant', tenantSlug);
        params.set('contentType', contentTypeSlug);
        window.history.replaceState({}, '', `${window.location.pathname}?${params.toString()}`);
      }

      function clearVehicles() {
        vehiclesGrid.innerHTML = '';
      }

      function firstMediaUrl(item) {
        if (!item || !Array.isArray(item.media)) {
          return '';
        }
        const first = item.media[0];
        if (!first || !first.file) {
          return '';
        }
        return asText(first.file.publicUrl);
      }

      function renderVehicleCard(item) {
        const data = item && typeof item.data === 'object' && item.data ? item.data : {};
        const title = asText(item.title) || `${asText(data.brand)} ${asText(data.model)}`.trim() || 'Vehículo';
        const category = asText(item.category && item.category.name);
        const imageUrl = firstMediaUrl(item);

        const card = document.createElement('article');
        card.className = 'vehicle-card';

        if (imageUrl) {
          const image = document.createElement('img');
          image.className = 'vehicle-image';
          image.src = imageUrl;
          image.alt = title;
          card.appendChild(image);
        }

        const body = document.createElement('div');
        body.className = 'vehicle-body';
        const titleNode = document.createElement('h3');
        titleNode.className = 'vehicle-title';
        titleNode.textContent = title;
        body.appendChild(titleNode);

        const list = document.createElement('dl');
        list.className = 'kv';
        const rows = [
          ['Slug', asText(item.slug)],
          ['Categoría', category || '-'],
          ['Marca', asText(data.brand) || '-'],
          ['Modelo', asText(data.model) || '-'],
          ['Año', asNumberLike(data.year) || '-'],
          ['Precio', asNumberLike(data.price) || '-'],
          ['Moneda', asText(data.currency) || '-'],
          ['Condición', asText(data.condition) || '-'],
          ['Stock', asText(data.stockStatus) || '-'],
        ];
        for (const [label, value] of rows) {
          const dt = document.createElement('dt');
          dt.textContent = label;
          const dd = document.createElement('dd');
          dd.textContent = value;
          list.appendChild(dt);
          list.appendChild(dd);
        }
        body.appendChild(list);

        card.appendChild(body);
        vehiclesGrid.appendChild(card);
      }

      async function loadVehicles(apiBase, tenantSlug, contentTypeSlug) {
        statusEl.textContent = 'Cargando vehículos...';
        summaryEl.textContent = 'Vehículos encontrados: 0';
        clearVehicles();
        rawOutput.textContent = '';

        try {
          const normalizedApiBase = apiBase.replace(/\/+$/, '');
          const response = await fetch(
            `${normalizedApiBase}/public/${encodeURIComponent(tenantSlug)}/content-types/${encodeURIComponent(contentTypeSlug)}/entries?limit=120`,
            {
              cache: 'no-store',
              headers: { 'Cache-Control': 'no-cache' },
            },
          );

          if (!response.ok) {
            throw new Error(`Error ${response.status} al consultar API pública`);
          }

          const payload = await response.json();
          const items = Array.isArray(payload.items) ? payload.items : [];
          summaryEl.textContent = `Vehículos encontrados: ${items.length}`;
          rawOutput.textContent = JSON.stringify(payload, null, 2);

          if (items.length === 0) {
            const empty = document.createElement('div');
            empty.className = 'empty';
            empty.textContent = 'No hay vehículos para mostrar todavía.';
            vehiclesGrid.appendChild(empty);
          } else {
            for (const item of items) {
              renderVehicleCard(item);
            }
          }

          statusEl.textContent = 'Carga completada';
        } catch (error) {
          statusEl.textContent =
            error && error.message ? `Error: ${error.message}` : 'Error inesperado al cargar vehículos';
        }
      }

      form.addEventListener('submit', (event) => {
        event.preventDefault();
        const apiBase = apiBaseInput.value.trim();
        const tenantSlug = tenantSlugInput.value.trim();
        const contentTypeSlug = contentTypeSlugInput.value.trim() || 'vehicles';

        if (!apiBase || !tenantSlug || !contentTypeSlug) {
          statusEl.textContent = 'Completa API base, tenant y content type';
          return;
        }

        writeQueryConfig(apiBase, tenantSlug, contentTypeSlug);
        void loadVehicles(apiBase, tenantSlug, contentTypeSlug);
      });

      readQueryConfig();
      if (tenantSlugInput.value.trim()) {
        void loadVehicles(
          apiBaseInput.value.trim(),
          tenantSlugInput.value.trim(),
          contentTypeSlugInput.value.trim() || 'vehicles',
        );
      }
    </script>
  </body>
</html>
