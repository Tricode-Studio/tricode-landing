<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // Setea el tema antes del primer paint para evitar flash (FOUC).
      (function () {
        try {
          var stored = localStorage.getItem('tricode-theme');
          var theme =
            stored === 'light' || stored === 'dark'
              ? stored
              : window.matchMedia('(prefers-color-scheme: light)').matches
                ? 'light'
                : 'dark';
          document.documentElement.setAttribute('data-theme', theme);
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', theme === 'light' ? '#f8f6f1' : '#05060b');
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
    <meta name="theme-color" content="#05060b" />
    <link rel="icon" type="image/png" href="/isotipo.png?v=20260427-1" />
    <link rel="apple-touch-icon" href="/isotipo.png?v=20260427-1" />
